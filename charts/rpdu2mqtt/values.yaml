# Default values for rpdu2mqtt.

image:
  repository: ghcr.io/xtremeownage/rpdu2mqtt
  # Defaults to the chart's appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# v3: a homogeneous Orleans fleet — raise this to run N identical all-in-one replicas. They form one silo
# cluster (Kubernetes membership turns on automatically when >1), single-owner work (the PDU session) is a
# single-activation grain, and the publishers/exporters are leader-gated, so replicas never duplicate output.
# Scale for HA/throughput by replica count; no roles to juggle.
replicaCount: 1

# Legacy tiering (#179): split the app's roles into separate Deployments — worker (polls the PDUs,
# publishes MQTT, serves /metrics), api (REST API), ui (config GUI). Off by default; prefer raising
# replicaCount above (a homogeneous fleet) over this. Kept for anyone who wants dedicated tiers.
split:
  enabled: false
  worker:
    replicaCount: 1
    resources: {}
  api:
    replicaCount: 1
    resources: {}
  ui:
    replicaCount: 1
    resources: {}

# Kubernetes operator (#210): run a dedicated single-replica process that manages this release's own
# Deployment — checks the registry for newer images and (if config.Operator.AutoUpdate) rolls to them.
# Needs kubernetesConfigSource.enabled (it patches the CR status + Deployments). Also switch on the
# behaviour with config.Operator.Enabled below.
operator:
  enabled: false

# ---------------------------------------------------------------------------
# Application configuration.
# This whole block is rendered verbatim into config.yaml (mounted at /config).
# It is the single source of truth for app behaviour, including Gui.Enabled and
# Prometheus.Exporter (the Kubernetes Service/Ingress/ServiceMonitor toggles below
# only control whether those *resources* are created).
# See docs/Configuration.md for every option.
# ---------------------------------------------------------------------------
config:
  MQTT:
    Connection:
      Host: mqtt.example.com
      Port: 1883
    ParentTopic: rPDU2MQTT
  Pdus:
    default:
      Connection:
        Host: pdu.example.com
        Port: 80
      PollInterval: 5
  HomeAssistant:
    DiscoveryEnabled: true
    DiscoveryTopic: homeassistant
  Prometheus:
    # Expose /metrics. (Old name: `Enabled`, still accepted.)
    Exporter: false
    Port: 9184
  Gui:
    Enabled: false
    Port: 8080
    Username: admin
    # Set Gui.Password via .Values.config or, better, leave the GUI disabled in
    # Kubernetes (the ConfigMap mount is read-only, so Save is disabled anyway).
  Health:
    Enabled: true
    Port: 8081
  Api:
    # Read-only REST API (/api/v1/*) plus its OpenAPI document (/openapi/v1.json) and
    # interactive Scalar docs (/scalar/v1). Unauthenticated for reads — keep it on a
    # trusted network, or front it with auth at your ingress.
    Enabled: false
    Port: 8082
    # Set ApiKey to enable the write/control endpoints (sent as the X-Api-Key header).
    # Prefer credentials.apiKey below (injected as RPDU2MQTT_API_KEY) over setting it here.
    # ApiKey: ""

# ---------------------------------------------------------------------------
# Credentials, injected as RPDU2MQTT_* environment variables via a Secret so
# they don't have to live in the ConfigMap. Set values here to have the chart
# create a Secret, or point existingSecret at a Secret you manage (whose keys
# are the RPDU2MQTT_* variable names).
# ---------------------------------------------------------------------------
existingSecret: ""
credentials:
  mqtt:
    username: ""
    password: ""
  pdu:
    username: ""
    password: ""
  emoncmsApiKey: ""
  # GUI OIDC client secret (RPDU2MQTT_OIDC_CLIENT_SECRET) when using Gui.Oidc.
  oidcClientSecret: ""
  # REST API key (RPDU2MQTT_API_KEY) enabling the API's write/control endpoints (config.Api.ApiKey).
  apiKey: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Scheduled rollout restart (#216, Kubernetes only). Adds a CronJob that rolling-restarts this release's
# Deployment(s) — which also re-pulls the image when the tag is mutable (`stable`, `latest`), so it doubles
# as an update mechanism. The job restarts only the Deployments this release renders (matched by label) and
# gets its own ServiceAccount with nothing but get/list/patch on Deployments.
autoRestart:
  enabled: false
  # Standard cron, in the cluster's timezone unless timeZone is set. Default: 04:00 daily.
  schedule: "0 4 * * *"
  # IANA name (e.g. "America/Chicago"). Requires Kubernetes 1.27+; leave empty to use the cluster's zone.
  timeZone: ""
  # If the cluster was down at the scheduled time, skip the missed run rather than restarting on recovery.
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  backoffLimit: 2
  image:
    repository: bitnami/kubectl
    tag: "1.34"
    pullPolicy: IfNotPresent
    pullSecrets: []
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  nodeSelector: {}
  tolerations: []

# Store configuration in a Kubernetes RpduConfig custom resource instead of a ConfigMap.
# When enabled: the chart creates the CR (from `config` above) and grants RBAC to read/write it,
# the app reads config from the CR (RPDU2MQTT_CONFIG_SOURCE=k8s), and the GUI's Save writes back to
# the CR. Requires the RpduConfig CRD to be installed (shipped in this chart's crds/ directory).
kubernetesConfigSource:
  enabled: false
  # Name of the RpduConfig resource (defaults to the release fullname).
  crName: ""
  # Create-once: keep the live CR's spec on upgrade (so GUI edits aren't reverted); values.config
  # only seeds it on first install. Set false to always apply values.config (declarative).
  # NOTE: relies on Helm `lookup` — under Argo CD (helm template) it can't read the live CR, so use
  # an Argo ignoreDifferences on the RpduConfig spec instead (see the chart README).
  preserveExisting: true
  # Whether the chart renders the mutable config resources (the RpduConfig CR and the GUI-written
  # credentials Secret). Set false to let the app read/write ones you manage out of band, so GitOps
  # (Argo/Flux) never syncs over GUI edits. RBAC + the k8s config source stay on; you create the CR
  # (and Secret, if used) yourself once.
  manageResource: true

# Kubernetes Services for the GUI, REST API and /metrics endpoints. Created only when the
# corresponding feature is enabled in `config` AND the toggle here is true.
service:
  gui:
    enabled: true
    type: ClusterIP
    annotations: {}
  # Requires config.Api.Enabled. Backs the `service: api` route option below.
  api:
    enabled: true
    type: ClusterIP
    annotations: {}
  metrics:
    enabled: true
    type: ClusterIP
    annotations: {}

# Prometheus Operator ServiceMonitor for the /metrics Service. Requires the Prometheus
# Operator CRDs, plus config.Prometheus.Exporter and service.metrics.enabled.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: ""
  # Labels stamped on the ServiceMonitor so your Prometheus adopts it. A Prometheus only scrapes
  # ServiceMonitors matching its spec.serviceMonitorSelector — most commonly the kube-prometheus-stack
  # default of `release: <your-stack-release>`, so without this the ServiceMonitor is silently ignored.
  # Find the value with:
  #   kubectl get prometheus -A -o jsonpath='{.items[*].spec.serviceMonitorSelector}'
  # e.g. for a release named "prometheus-stack":
  #   labels:
  #     release: prometheus-stack
  labels: {}

# Ingress for the GUI and/or REST API Services.
# Each path routes to `service: gui` (default) or `service: api` — the latter requires
# config.Api.Enabled and service.api.enabled. To expose the API too, add a path for it, e.g.
#   paths:
#     - path: /
#       pathType: Prefix
#     - path: /api
#       pathType: Prefix
#       service: api
# The API serves its docs at /scalar/v1 and /openapi/v1.json, so routing only /api hides them;
# give the API its own host (or add those paths) if you want the docs reachable too.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: rpdu2mqtt.example.com
      paths:
        - path: /
          pathType: Prefix
          # service: gui
  tls: []

# Gateway API HTTPRoute for the GUI Service (alternative to Ingress). Requires the
# Gateway API CRDs and a Gateway. By default routes all traffic to the GUI Service.
httpRoute:
  enabled: false
  # The Gateway(s) to attach to.
  parentRefs:
    - name: main-gateway
      # namespace: gateway-namespace
  hostnames:
    - rpdu2mqtt.example.com
  annotations: {}
  # Path-based routing, mirroring `ingress.hosts[].paths`. Each entry routes to `service: gui`
  # (default) or `service: api`. Empty = route everything to the GUI Service. e.g.
  #   paths:
  #     - path: /
  #       type: PathPrefix
  #     - path: /api
  #       type: PathPrefix
  #       service: api
  paths: []
  # Full escape hatch: raw HTTPRoute rules, used verbatim and taking precedence over `paths`.
  rules: []

# NetworkPolicy to restrict pod access. When enabled, ingress to the GUI/metrics ports is allowed
# only from the peers listed below (so users reach the GUI via Ingress/HTTPRoute, not the pod
# directly); health probes are always allowed. Requires a CNI that enforces NetworkPolicy.
networkPolicy:
  enabled: false
  # Peers (NetworkPolicyPeer: namespaceSelector / podSelector / ipBlock) allowed to reach the GUI
  # port — e.g. your ingress controller or Gateway. Empty = no direct GUI ingress is permitted.
  guiIngressFrom: []
    # - namespaceSelector:
    #     matchLabels:
    #       kubernetes.io/metadata.name: ingress-nginx
  # Peers allowed to reach the REST API port (e.g. your ingress controller/Gateway, or the
  # automation that consumes it). Empty = no direct API ingress is permitted.
  apiIngressFrom: []
  # Peers allowed to scrape the metrics port (e.g. your Prometheus). Empty = none.
  metricsIngressFrom: []
  # Restrict egress to DNS + the rules below. When false, egress is unrestricted.
  restrictEgress: false
  # Extra egress rules (NetworkPolicyEgressRule) for your MQTT broker, PDU, and — with the
  # Kubernetes config source — the API server. Required when restrictEgress is true.
  egress: []
    # - to:
    #     - ipBlock:
    #         cidr: 10.0.0.10/32   # MQTT broker
    #   ports:
    #     - port: 1883
    #       protocol: TCP

# Liveness/readiness probes against the app's health endpoints (config.Health).
# Liveness  -> /healthz (process is up); Readiness -> /readyz (MQTT connected + PDU polled recently).
healthProbes:
  enabled: true
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  # Poll frequently with a short initial delay so the pod is marked Ready promptly.
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6

resources: {}
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
