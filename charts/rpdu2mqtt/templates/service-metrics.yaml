{{- if and ((include "rpdu2mqtt.metricsEnabled" .)) .Values.service.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rpdu2mqtt.fullname" . }}-metrics
  labels:
    {{- include "rpdu2mqtt.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
  {{- with .Values.service.metrics.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.metrics.type }}
  selector:
    {{- include "rpdu2mqtt.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ include "rpdu2mqtt.metricsPort" . }}
      targetPort: metrics
{{- end }}
