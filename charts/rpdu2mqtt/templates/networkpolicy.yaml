{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rpdu2mqtt.fullname" . }}
  labels:
    {{- include "rpdu2mqtt.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "rpdu2mqtt.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.restrictEgress }}
    - Egress
    {{- end }}
  ingress:
    {{- if (include "rpdu2mqtt.clustered" .) }}
    # v3: Orleans silo-to-silo + gateway traffic between this release's own pods (clustering).
    - from:
        - podSelector:
            matchLabels:
              {{- include "rpdu2mqtt.selectorLabels" . | nindent 14 }}
      ports:
        - port: 11111
          protocol: TCP
        - port: 30000
          protocol: TCP
    {{- end }}
    {{- if dig "Health" "Enabled" true .Values.config }}
    # Allow health probes (kubelet) to the health port from any source.
    - ports:
        - port: {{ dig "Health" "Port" 8081 .Values.config }}
          protocol: TCP
    {{- end }}
    {{- if and (dig "Gui" "Enabled" false .Values.config) .Values.networkPolicy.guiIngressFrom }}
    # Allow the GUI port only from the configured peers (e.g. your gateway/ingress controller).
    - from:
        {{- toYaml .Values.networkPolicy.guiIngressFrom | nindent 8 }}
      ports:
        - port: {{ dig "Gui" "Port" 8080 .Values.config }}
          protocol: TCP
    {{- end }}
    {{- if and ((include "rpdu2mqtt.apiEnabled" .)) .Values.networkPolicy.apiIngressFrom }}
    # Allow the REST API port only from the configured peers (e.g. your gateway/ingress controller).
    - from:
        {{- toYaml .Values.networkPolicy.apiIngressFrom | nindent 8 }}
      ports:
        - port: {{ include "rpdu2mqtt.apiPort" . }}
          protocol: TCP
    {{- end }}
    {{- if and ((include "rpdu2mqtt.metricsEnabled" .)) .Values.networkPolicy.metricsIngressFrom }}
    # Allow the metrics port only from the configured peers (e.g. Prometheus).
    - from:
        {{- toYaml .Values.networkPolicy.metricsIngressFrom | nindent 8 }}
      ports:
        - port: {{ include "rpdu2mqtt.metricsPort" . }}
          protocol: TCP
    {{- end }}
  {{- if .Values.networkPolicy.restrictEgress }}
  egress:
    # DNS resolution (always needed).
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if (include "rpdu2mqtt.clustered" .) }}
    # v3: Orleans silo-to-silo + gateway traffic to this release's own pods (clustering needs egress too).
    - to:
        - podSelector:
            matchLabels:
              {{- include "rpdu2mqtt.selectorLabels" . | nindent 14 }}
      ports:
        - port: 11111
          protocol: TCP
        - port: 30000
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    # Caller-provided egress (MQTT broker, PDU, and the Kubernetes API server when using the
    # Kubernetes config source). Without these, restricted egress will block the bridge.
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
