{{- if .Values.kubernetesConfigSource.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "rpdu2mqtt.fullname" . }}
  labels:
    {{- include "rpdu2mqtt.labels" . | nindent 4 }}
rules:
  - apiGroups: ["rpdu2mqtt.xtremeownage.com"]
    resources: ["rpduconfigs"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["rpdu2mqtt.xtremeownage.com"]
    resources: ["rpduconfigs/status"]
    verbs: ["get", "patch", "update"]
  # Lets the GUI Diagnostics page show this pod's logs + recent events, and lets a restart request delete
  # this pod so Kubernetes replaces it immediately (#192) — stopping the process instead exits 0, shows as
  # a "Completed" pod, and comes back on the kubelet's backoff. Namespaced; the app only deletes itself.
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  # Lets the GUI Diagnostics page roll-restart this release's Deployment(s) (restart a tier / update image).
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  # Lets the GUI persist credentials (incl. OIDC client secret) into the companion Secret,
  # instead of the CR spec. Scoped to just that Secret (the chart pre-creates it).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch", "update"]
    resourceNames: ["{{ include "rpdu2mqtt.secretName" . }}"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "rpdu2mqtt.fullname" . }}
  labels:
    {{- include "rpdu2mqtt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "rpdu2mqtt.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rpdu2mqtt.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if (include "rpdu2mqtt.clustered" .) }}
---
# v3: Orleans Kubernetes clustering. Split roles are separate silos that form one cluster; membership is
# stored in orleans.dot.net custom resources (no external DB) — the CRDs themselves ship in this chart's
# crds/ directory, so the app never needs cluster-scoped CRD permissions. Namespaced CRUD on the resources:
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "rpdu2mqtt.fullname" . }}-orleans
  labels:
    {{- include "rpdu2mqtt.labels" . | nindent 4 }}
rules:
  - apiGroups: ["orleans.dot.net"]
    resources: ["clusterversions", "silos"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "rpdu2mqtt.fullname" . }}-orleans
  labels:
    {{- include "rpdu2mqtt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "rpdu2mqtt.fullname" . }}-orleans
subjects:
  - kind: ServiceAccount
    name: {{ include "rpdu2mqtt.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
