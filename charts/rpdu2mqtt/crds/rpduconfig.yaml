                    x-kubernetes-preserve-unknown-fields: true
                    properties:
                      Path:
                        type: string
                      FileRollover:
                        type: string
                        enum:
                        - Infinite
                        - Year
                        - Month
                        - Day
                        - Hour
                        - Minute
                      FileRetention:
                        type: integer
                      Severity:
                        type: string
                        enum:
                        - Verbose
                        - Debug
                        - Information
                        - Warning
                        - Error
                        - Fatal
                      Format:
                        type: string
                      Enabled:
                        type: boolean
                  Syslog:
                    type: object
