<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>rPDU2MQTT — Energy data consolidation</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header>
  <h1>rPDU2MQTT<span class="tagline">Energy data consolidation</span></h1>
  <div class="status">
    <span id="st-version"></span>
    <button id="st-update" class="st-update" style="display:none"></button>
    <span><span id="st-mqtt-dot" class="dot"></span>MQTT</span>
    <span id="st-user"></span>
    <a id="st-logout" href="/logout" style="display:none;color:var(--accent)">Logout</a>
  </div>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main>
    <div id="sections"></div>
    <div class="actions">
      <button class="primary" id="btn-save">Save</button>
      <button id="btn-reload">Reload</button>
      <span class="ro-note" id="ro-note">Config is read-only (ConfigMap / <code>:ro</code> mount) — editing disabled.</span>
      <span class="toast" id="toast"></span>
    </div>
  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
