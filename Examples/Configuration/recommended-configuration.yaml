Mqtt:
    Connection:
        Host: "192.168.1.1" # Update to the IP of your MQTT broker.
        Port: 1883 
    Credentials:
        Username: "admin"
        Password: "password"

    ParentTopic: "Rack_PDU"

PDU:
    Connection:
        Host: 192.168.1.2   # Update to the IP of your PDU.
        Port: 80

    PollInterval: 5

    # Required only if you enable outlet on/off control below.
    # Can also be supplied via RPDU2MQTT_PDU_USERNAME / RPDU2MQTT_PDU_PASSWORD env vars.
    #Credentials:
    #    Username: "actions-user"
    #    Password: "actions-pass"

    # Enables outlet on/off control from Home Assistant (publishes switch entities).
    # Requires Credentials above with "Control" permission on every PDU in a cluster. Default: false.
    #ActionsEnabled: true
Overrides:
    PDU: 
        Name: "Your PDU"

    Devices:
        YOUR-SERIAL-NUMBER:
            ID: your_pdu
            Name: MY PDU
            Enabled: true


    Measurements:
        # I override the names, to give a more usable display name.
        # Also- I change the ID, to be a bit shorter for power.
        apparentPower:
            Name: Apparent Power
        realPower:
            ID: power
            Name: Power
        energy:
            Name: Energy
        powerFactor:
            Name: Power Factor
        current: 
            Name: Current
        voltage:
            Name: Voltage
        # I recommend leaving these disabled, unless you have a use-case for them.
        currentCrestFactor:
            Enabled: false
        balance:
            Enabled: false

HomeAssistant:
    DiscoveryEnabled: true
    DiscoveryTopic: "homeassistant"

    # Short discovery interval is used for testing.
    DiscoveryInterval: 30

