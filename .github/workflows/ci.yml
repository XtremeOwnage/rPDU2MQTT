name: CI

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test --configuration Release

  chart:
    name: Helm chart smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint charts/rpdu2mqtt
      - name: helm template (defaults)
        run: helm template rpdu2mqtt charts/rpdu2mqtt > /dev/null
      - name: helm template (CRD config source)
        run: helm template rpdu2mqtt charts/rpdu2mqtt --set kubernetesConfigSource.enabled=true > /dev/null

      - name: helm template (split roles)
        run: |
          out=$(helm template rpdu2mqtt charts/rpdu2mqtt --set split.enabled=true \
            --set config.Gui.Enabled=true --set config.Prometheus.Exporter=true)
          [ "$(echo "$out" | grep -c '^kind: Deployment')" = 3 ] || { echo "expected 3 role Deployments"; exit 1; }
          for role in worker api ui; do
            echo "$out" | grep -q "name: rpdu2mqtt-$role$" || { echo "missing $role Deployment"; exit 1; }
            echo "$out" | grep -q "value: \"$role\"" || { echo "missing RPDU2MQTT_ROLE=$role"; exit 1; }
          done

      - name: helm template (scheduled restart)
        run: |
          # Off by default: no CronJob, and no RBAC granted for one.
          out=$(helm template rpdu2mqtt charts/rpdu2mqtt)
          echo "$out" | grep -q 'kind: CronJob' && { echo "CronJob should not render by default"; exit 1; }

          out=$(helm template rpdu2mqtt charts/rpdu2mqtt --set autoRestart.enabled=true --set autoRestart.schedule='30 3 * * 0')
          echo "$out" | grep -q 'kind: CronJob' || { echo "missing CronJob"; exit 1; }
          echo "$out" | grep -q 'schedule: "30 3 \* \* 0"' || { echo "schedule not applied"; exit 1; }
          # It must restart by label (this release only), never a bare 'rollout restart deployment'.
          echo "$out" | grep -q 'app.kubernetes.io/instance=rpdu2mqtt' || { echo "restart must be scoped by label"; exit 1; }
          # Its own ServiceAccount, not the app's.
          echo "$out" | grep -q 'name: rpdu2mqtt-restart' || { echo "missing restart ServiceAccount/Role"; exit 1; }

      - name: helm template (CRD config source, unmanaged resource)
        run: |
          out=$(helm template rpdu2mqtt charts/rpdu2mqtt \
            --set kubernetesConfigSource.enabled=true --set kubernetesConfigSource.manageResource=false)
          echo "$out" | grep -q 'kind: RpduConfig' && { echo "RpduConfig should not be rendered"; exit 1; }
          echo "$out" | grep -q 'RPDU2MQTT_CONFIG_SOURCE' || { echo "app should still read from the CR"; exit 1; }
